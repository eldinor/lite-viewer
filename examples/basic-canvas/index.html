<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon Lite Viewer - Basic Canvas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <canvas id="viewer"></canvas>
      <div id="loading" class="status">Loading...</div>
      <div id="error" class="error" hidden></div>
      <div class="toolbar">
        <select id="model">
          <option value="https://playground.babylonjs.com/scenes/BoomBox.glb">
            BoomBox
          </option>
          <option value="/examples/basic-canvas/models/cube.gltf">
            Local cube
          </option>
          <option value="/examples/basic-canvas/models/pyramid.gltf">
            Local pyramid
          </option>
        </select>
        <button id="load">Load another model</button>
        <input id="file" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden />
        <button id="upload">Upload GLB</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
