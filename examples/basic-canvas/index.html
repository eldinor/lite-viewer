<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon Lite Viewer - Basic Canvas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Babylon Lite Viewer</h1>

        <div id="loading" class="status">Loading...</div>
        <div id="error" class="error" hidden></div>

        <div class="control-group">
          <select id="model" aria-label="Model">
            <option value="https://playground.babylonjs.com/scenes/BoomBox.glb">
              BoomBox
            </option>
            <option value="https://assets.babylonjs.com/meshes/aerobatic_plane.glb">
              Aerobatic plane
            </option>
            <option value="https://assets.babylonjs.com/meshes/Marble/marbleTower/marbleTower.gltf">
              Marble tower
            </option>
          </select>
          <input id="file" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden />
          <button id="upload">Upload GLB</button>
        </div>

        <div class="control-group">
          <label for="clear-color">Clear color</label>
          <input id="clear-color" type="color" value="#05054d" />
          <label for="clear-alpha">Alpha</label>
          <input id="clear-alpha" type="range" min="0" max="1" step="0.01" value="0.2" />
        </div>

        <div class="control-group">
          <label for="animation">Animation group</label>
          <select id="animation" disabled>
            <option value="">No animations</option>
          </select>
          <button id="pause-animation" disabled>Pause</button>
          <button id="stop-animation" disabled>Stop</button>
        </div>

        <div class="control-group">
          <button id="screenshot">Screenshot</button>
          <div id="screenshot-preview" class="screenshot-preview" hidden>
            <img id="screenshot-image" alt="Screenshot preview" />
            <a id="download-screenshot" class="download-icon" download="lite-viewer-screenshot.png" aria-label="Download screenshot" title="Download screenshot">
              &darr;
            </a>
          </div>
          <p class="note">Saved screenshots are opaque; transparent canvas alpha is not preserved.</p>
        </div>
      </aside>
      <main class="viewer-pane">
        <canvas id="viewer"></canvas>
      </main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
